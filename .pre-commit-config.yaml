repos:
  - repo: local
    hooks:
      - id: biome-format
        name: Format with Biome
        entry: npm run format --
        language: system
        files: ^(src/.*\.(ts|tsx)|package\.json|tsconfig\.json|biome\.json)$

      - id: biome-lint
        name: Lint with Biome
        entry: npm run lint --
        language: system
        files: ^(src/.*\.(ts|tsx)|package\.json|tsconfig\.json|biome\.json)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
